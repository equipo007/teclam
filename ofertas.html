    <!-- =========================
         SCRIPT CARRITO
    ========================== -->
    <script>

        // ARRAY DEL CARRITO
        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        // CONTADOR
        let cantidadProductos = carrito.length;

        // ELEMENTO HTML
        const contadorElemento =
            document.getElementById("contadorCarrito");

        // ACTUALIZAR CONTADOR
        actualizarContador();

        // FUNCION AGREGAR
        function agregarCarrito(nombre, precio) {

            // CREAR PRODUCTO
            const producto = {

                nombre: nombre,
                precio: precio

            };

            // AGREGAR AL ARRAY
            carrito.push(producto);

            // GUARDAR
            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            // AUMENTAR CONTADOR
            cantidadProductos++;

            actualizarContador();

            alert(nombre + " agregado al carrito");

        }

        // ACTUALIZAR CONTADOR VISUAL
        function actualizarContador() {

            contadorElemento.textContent =
                cantidadProductos;

            if (cantidadProductos > 0) {

                contadorElemento.style.display =
                    "inline-block";

            } else {

                contadorElemento.style.display =
                    "none";

            }

        }

        // VACIAR CARRITO
        function vaciarCarrito() {

            carrito = [];

            cantidadProductos = 0;

            localStorage.removeItem("carrito");

            actualizarContador();

        }

    </script>

    <!-- =========================
         TEMPORIZADOR
    ========================== -->
    <script>

        let tiempoFinal =
            new Date().getTime() +
            (2 * 60 * 60 * 1000);

        setInterval(() => {

            let ahora =
                new Date().getTime();

            let restante =
                tiempoFinal - ahora;

            let horas = Math.floor(
                restante / (1000 * 60 * 60)
            );

            let minutos = Math.floor(
                (restante % (1000 * 60 * 60))
                / (1000 * 60)
            );

            let segundos = Math.floor(
                (restante % (1000 * 60))
                / 1000
            );

            document.getElementById(
                "contador-tiempo"
            ).innerText =

                `⏰ Termina en: ${horas}h ${minutos}m ${segundos}s`;

        }, 1000);

    </script>
