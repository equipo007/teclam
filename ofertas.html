    <!-- CARRITO -->
    <script>

        let carrito =
            JSON.parse(
                localStorage.getItem("carrito")
            ) || [];

        let cantidadProductos =
            carrito.length;

        const contadorElemento =
            document.getElementById(
                "contadorCarrito"
            );

        actualizarContador();

        function agregarCarrito(
            nombre,
            precio
        ) {

            const producto = {

                nombre: nombre,
                precio: precio

            };

            carrito.push(producto);

            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            cantidadProductos++;

            actualizarContador();

            alert(
                nombre +
                " agregado al carrito"
            );
        }

        function actualizarContador() {

            contadorElemento.textContent =
                cantidadProductos;
        }

    </script>

    <!-- TEMPORIZADOR -->
    <script>

        let tiempoFinal =
            new Date().getTime()
            + (2 * 60 * 60 * 1000);

        setInterval(() => {

            let ahora =
                new Date().getTime();

            let restante =
                tiempoFinal - ahora;

            let horas =
                Math.floor(
                    restante /
                    (1000 * 60 * 60)
                );

            let minutos =
                Math.floor(
                    (restante %
                    (1000 * 60 * 60))
                    /
                    (1000 * 60)
                );

            let segundos =
                Math.floor(
                    (restante %
                    (1000 * 60))
                    / 1000
                );

            document
                .getElementById(
                    "contador-tiempo"
                ).innerText =

                `⏰ Termina en:
                ${horas}h
                ${minutos}m
                ${segundos}s`;

        }, 1000);

    </script>
